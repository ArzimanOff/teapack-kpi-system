version: '3.8'

services:

  # ─── База данных ───────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: teapack-postgres
    environment:
      POSTGRES_DB: teapack_kpi_db
      POSTGRES_USER: teapack
      POSTGRES_PASSWORD: teapack123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teapack -d teapack_kpi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Микросервисы ──────────────────────────────────────────────
  user-management-service:
    build: ./user-management-service
    container_name: teapack-user-management
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/teapack_kpi_db
      SPRING_DATASOURCE_USERNAME: teapack
      SPRING_DATASOURCE_PASSWORD: teapack123
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    container_name: teapack-api-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: http://user-management-service:8087
      DATA_COLLECTION_URL: http://data-collection-service:8082
      DATA_PROCESSING_URL: http://data-processing-service:8083
      KPI_CALCULATION_URL: http://kpi-calculation-service:8084
      REPORTING_URL: http://reporting-service:8085
      NOTIFICATION_URL: http://notification-service:8086
    depends_on:
      - user-management-service

  equipment-emulator:
    build: ./equipment-emulator
    container_name: teapack-emulator
    ports:
      - "8081:8081"
    environment:
      DATA_COLLECTION_URL: http://data-collection-service:8082
    depends_on:
      - data-collection-service

  data-collection-service:
    build: ./data-collection-service
    container_name: teapack-data-collection
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/teapack_kpi_db
      SPRING_DATASOURCE_USERNAME: teapack
      SPRING_DATASOURCE_PASSWORD: teapack123
      DATA_PROCESSING_URL: http://data-processing-service:8083
    depends_on:
      postgres:
        condition: service_healthy

  data-processing-service:
    build: ./data-processing-service
    container_name: teapack-data-processing
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/teapack_kpi_db
      SPRING_DATASOURCE_USERNAME: teapack
      SPRING_DATASOURCE_PASSWORD: teapack123
      KPI_CALCULATION_URL: http://kpi-calculation-service:8084
    depends_on:
      postgres:
        condition: service_healthy

  kpi-calculation-service:
    build: ./kpi-calculation-service
    container_name: teapack-kpi-calculation
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/teapack_kpi_db
      SPRING_DATASOURCE_USERNAME: teapack
      SPRING_DATASOURCE_PASSWORD: teapack123
      REPORTING_URL: http://reporting-service:8085
      NOTIFICATION_URL: http://notification-service:8086
    depends_on:
      postgres:
        condition: service_healthy

  reporting-service:
    build: ./reporting-service
    container_name: teapack-reporting
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/teapack_kpi_db
      SPRING_DATASOURCE_USERNAME: teapack
      SPRING_DATASOURCE_PASSWORD: teapack123
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    container_name: teapack-notification
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/teapack_kpi_db
      SPRING_DATASOURCE_USERNAME: teapack
      SPRING_DATASOURCE_PASSWORD: teapack123
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: