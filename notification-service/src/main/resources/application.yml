server:
  port: 8086

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/teapack_kpi_db
    username: teapack
    password: teapack123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: notification

  flyway:
    enabled: true
    schemas: notification
    locations: classpath:db/migration
    baseline-on-migrate: false
    default-schema: notification
    validate-on-migrate: false

# Пороговые значения KPI для уведомлений
kpi:
  thresholds:
    oee-min: 0.65
    availability-min: 0.80
    performance-min: 0.75
    quality-min: 0.95

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

logging:
  level:
    com.teapack.notification: DEBUG