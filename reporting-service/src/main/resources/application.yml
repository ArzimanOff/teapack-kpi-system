server:
  port: 8085

spring:
  application:
    name: reporting-service

  datasource:
    url: jdbc:postgresql://localhost:5432/teapack_kpi_db
    username: teapack
    password: teapack123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: reportingcd

  flyway:
    enabled: true
    schemas: reporting
    locations: classpath:db/migration
    baseline-on-migrate: false
    default-schema: reporting
    validate-on-migrate: false

kpi-calculation:
  url: http://localhost:8084

data-processing:
  url: http://localhost:8083

# Шрифт для PDF-отчётов. Можно переопределить через REPORT_FONT_PATH env.
# Если файл не найден, PDF будет сгенерирован стандартным шрифтом (без кириллицы).
report:
  font-path: ${REPORT_FONT_PATH:C:/Windows/Fonts/arial.ttf}
  font-path-bold: ${REPORT_FONT_PATH_BOLD:C:/Windows/Fonts/arialbd.ttf}

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

logging:
